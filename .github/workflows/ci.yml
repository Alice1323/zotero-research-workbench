name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    name: Node checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax check
        run: npm run check

      - name: Test
        run: npm test
