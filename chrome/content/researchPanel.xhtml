<?xml version="1.0"?>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Zotero Research Workbench</title>
    <style>
      :root {
        color-scheme: light dark;
        font: menu;
      }

      body {
        margin: 0;
        padding: 16px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      section {
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
        border-radius: 6px;
        padding: 12px;
      }

      button {
        min-height: 28px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Zotero Research Workbench</h1>
      <section>
        <strong>Research Panel</strong>
        <p>Current item actions will appear here.</p>
        <button type="button">Open Workbench</button>
      </section>
      <section>
        <strong>Global Entry Point</strong>
        <p>Providers, prompt templates, task ledger, export, and import.</p>
      </section>
    </main>
  </body>
</html>
