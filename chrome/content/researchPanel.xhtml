<?xml version="1.0"?>
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <title>Zotero 研究工作台</title>
    <style>
      :root {
        color-scheme: light dark;
        font: menu;
      }

      body {
        margin: 0;
        padding: 16px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 12px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      section {
        border: 1px solid color-mix(in srgb, CanvasText 22%, transparent);
        border-radius: 6px;
        padding: 12px;
      }

      button {
        min-height: 28px;
      }

      .paper-context {
        display: grid;
        gap: 6px;
        margin-block: 10px 12px;
      }

      .paper-title {
        font-weight: 600;
      }

      .paper-meta,
      .status {
        color: color-mix(in srgb, CanvasText 72%, transparent);
      }

      .paper-abstract {
        max-height: 90px;
        overflow: auto;
        line-height: 1.45;
      }

      .summary-output {
        min-height: 120px;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
        border: 1px solid color-mix(in srgb, CanvasText 18%, transparent);
        border-radius: 6px;
        padding: 10px;
        line-height: 1.5;
      }

      .field-grid {
        display: grid;
        gap: 8px;
        margin-block: 10px 12px;
      }

      label {
        display: grid;
        gap: 4px;
      }

      input {
        min-height: 28px;
        box-sizing: border-box;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
    </style>
    <script src="providerConnection.js"></script>
    <script src="providerSettings.js"></script>
    <script src="paperSummary.js"></script>
  </head>
  <body>
    <main>
      <h1>Zotero 研究工作台</h1>
      <section>
        <strong>研究面板</strong>
        <div class="paper-context" aria-live="polite">
          <span>选中文献</span>
          <div id="selected-paper-title" class="paper-title">未选择文献</div>
          <div id="selected-paper-meta" class="paper-meta">请在 Zotero 主窗口中选中一篇文献</div>
          <div id="selected-paper-abstract" class="paper-abstract"></div>
        </div>
        <div class="actions">
          <button id="refresh-paper-context" type="button">刷新当前上下文</button>
          <button id="summarize-selected-paper" type="button">总结选中文献</button>
        </div>
        <p id="paper-summary-status" class="status" aria-live="polite"></p>
        <div class="actions">
          <strong>生成结果</strong>
          <button id="copy-paper-summary" type="button">复制结果</button>
        </div>
        <div id="paper-summary-output" class="summary-output" aria-live="polite"></div>
      </section>
      <section>
        <strong>全局入口</strong>
        <p>服务商、提示词模板、任务记录、导出与导入。</p>
      </section>
      <section>
        <strong>LLM 服务商设置</strong>
        <div class="field-grid">
          <label>
            <span>接口地址</span>
            <input id="provider-base-url" type="url" value="https://api.openai.com/v1" />
          </label>
          <label>
            <span>API 密钥</span>
            <input id="provider-api-key" type="password" value="" />
          </label>
          <label>
            <span>模型名称</span>
            <input id="provider-model" type="text" value="" placeholder="例如 gpt-4.1-mini" />
          </label>
        </div>
        <div class="actions">
          <button id="provider-save" type="button">保存设置</button>
          <button id="provider-test" type="button">测试连接</button>
        </div>
        <p id="provider-status" aria-live="polite"></p>
      </section>
    </main>
  </body>
</html>
